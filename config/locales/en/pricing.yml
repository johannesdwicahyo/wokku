    cta_button: "Get Started Free — No Credit Card"
    cta_note: "Free tier includes 1 container and 1 database. No time limit."
    faq_heading: "Frequently asked questions"
    faq_q1: "How does hourly billing work?"
    faq_a1: "Resources are billed per hour based on actual usage. Your monthly cost is capped at the shown maximum — you'll never pay more than that for a full month. If you run a resource for only part of the month, you pay proportionally less."
    faq_q2: "What payment methods do you accept?"
    faq_a2: "Credit cards (Visa, Mastercard, Amex) via Stripe, and Indonesian payment methods (QRIS, bank transfer, virtual account) via iPaymu."
    faq_q3: "Can I self-host Wokku for free?"
    faq_a3: "Yes. The Community Edition is fully open source under AGPL-3.0. Run it on your own servers with no limits. See the GitHub repo to get started."
    faq_q4: "Do I need a credit card to start?"
    faq_a4: "No. The free tier is always free, no credit card required. You only need to add a payment method when you want to upgrade resources."
    faq_q5: "Are there bandwidth fees?"
    faq_a5: "No. We don't charge for inbound or outbound bandwidth."
    faq_q6: "Can I upgrade or downgrade anytime?"
    faq_a6: "Yes. Changes take effect immediately and are prorated to the hour. No commitments, cancel anytime."
    faq_q7: "What happens if I exceed the free tier?"
    faq_a7: "You'll be prompted to add a payment method. Your existing resources keep running — we never silently start charging you."
