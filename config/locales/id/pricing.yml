    cta_note: "Tier gratis termasuk 1 container dan 1 database. Tanpa batas waktu."
    faq_heading: "Pertanyaan yang sering ditanyakan"
    faq_q1: "Bagaimana cara kerja tagihan per jam?"
    faq_a1: "Sumber daya ditagih per jam berdasarkan penggunaan aktual. Biaya bulanan kamu dibatasi pada maksimum yang ditampilkan — kamu tidak akan pernah membayar lebih dari itu untuk satu bulan penuh. Jika kamu menggunakan sumber daya hanya sebagian bulan, kamu membayar secara proporsional."
    faq_q2: "Metode pembayaran apa yang diterima?"
    faq_a2: "Kartu kredit (Visa, Mastercard, Amex) melalui Stripe, dan metode pembayaran Indonesia (QRIS, transfer bank, virtual account) melalui iPaymu."
    faq_q3: "Apakah saya bisa self-host Wokku secara gratis?"
    faq_a3: "Ya. Community Edition sepenuhnya open source di bawah AGPL-3.0. Jalankan di server kamu sendiri tanpa batas. Lihat repo GitHub untuk memulai."
    faq_q4: "Apakah saya butuh kartu kredit untuk memulai?"
    faq_a4: "Tidak. Tier gratis selalu gratis, tanpa kartu kredit. Kamu hanya perlu menambahkan metode pembayaran ketika ingin upgrade sumber daya."
    faq_q5: "Apakah ada biaya bandwidth?"
    faq_a5: "Tidak. Kami tidak mengenakan biaya untuk bandwidth masuk maupun keluar."
    faq_q6: "Bisakah saya upgrade atau downgrade kapan saja?"
    faq_a6: "Ya. Perubahan berlaku segera dan dihitung secara proporsional per jam. Tanpa komitmen, batalkan kapan saja."
    faq_q7: "Apa yang terjadi jika saya melebihi tier gratis?"
    faq_a7: "Kamu akan diminta menambahkan metode pembayaran. Sumber daya yang ada tetap berjalan — kami tidak akan pernah diam-diam mulai menagih kamu."
