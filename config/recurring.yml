production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  health_checks:
    class: HealthCheckSchedulerJob
    schedule: every 5 minutes
    queue: default

  sync_servers:
    class: SyncServerSchedulerJob
    # Every 3 hours — out-of-band Dokku changes (someone SSH'd in and
    # ran a command directly) are rare, and HealthCheckSchedulerJob at
    # every 5 minutes catches the common "an app stopped running" case.
    # Users who know they made an out-of-band change can hit the manual
    # Sync button on /dashboard/servers/:id.
    schedule: every 3 hours
    queue: default

  metrics_poll:
    class: MetricsPollSchedulerJob
    schedule: every 1 minute
    queue: metrics

  dns_verification:
    class: DnsVerificationSchedulerJob
    schedule: every 5 minutes
    queue: default

  ssl_auto_renew:
    class: SslAutoRenewJob
    schedule: every day at 3am
    queue: default

  backup_scheduler:
    class: BackupSchedulerJob
    schedule: every day at 2am
    queue: backups

  backup_retention:
    class: BackupRetentionJob
    schedule: every day at 4am
    queue: backups

  daily_debit:
    class: DailyDebitSchedulerJob
    schedule: every day at 1am
    queue: default

  control_plane_backup:
    class: ControlPlaneBackupJob
    schedule: every day at 2:30am
    queue: backups

  activity_digest:
    class: ActivityDigestJob
    schedule: every day at 3:30am
    queue: default

  shared_database_quota:
    class: SharedDatabaseQuotaJob
    schedule: every 30 minutes
    queue: default

  dedicated_database_quota:
    class: DedicatedDatabaseQuotaJob
    schedule: every 30 minutes
    queue: default
