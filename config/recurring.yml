production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  health_checks:
    class: HealthCheckSchedulerJob
    schedule: every 5 minutes
    queue: default

  sync_servers:
    class: SyncServerSchedulerJob
    schedule: every 10 minutes
    queue: default

  metrics_poll:
    class: MetricsPollSchedulerJob
    schedule: every 1 minute
    queue: metrics

  dns_verification:
    class: DnsVerificationSchedulerJob
    schedule: every 5 minutes
    queue: default

  ssl_auto_renew:
    class: SslAutoRenewJob
    schedule: every day at 3am
    queue: default

  backup_scheduler:
    class: BackupSchedulerJob
    schedule: every day at 2am
    queue: backups

  backup_retention:
    class: BackupRetentionJob
    schedule: every day at 4am
    queue: backups

  daily_debit:
    class: DailyDebitSchedulerJob
    schedule: every day at 1am
    queue: default
