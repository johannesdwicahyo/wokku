<!doctype html>
<html lang="en">
<head>
  <title>Unprocessable Content - Wokku</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    body {
      background: #0f0a1a;
      color: #e0dce8;
      display: grid;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 16px;
      min-height: 100dvh;
      place-items: center;
      -webkit-font-smoothing: antialiased;
    }
    main { text-align: center; padding: 2rem; }
    .logo { font-size: 1.5rem; font-weight: 700; color: #a78bfa; margin-bottom: 2rem; }
    .code { font-size: 6rem; font-weight: 800; color: #2d2540; line-height: 1; }
    .title { font-size: 1.5rem; font-weight: 600; color: #f87171; margin: 0.5rem 0 1rem; }
    .desc { color: #9b95a8; max-width: 30em; margin: 0 auto 2rem; }
    a { color: #a78bfa; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div class="logo">Wokku</div>
    <div class="code">422</div>
    <div class="title">Unprocessable Content</div>
    <p class="desc">The request could not be processed. This may be due to an invalid form submission or expired session.</p>
    <a href="/">Back to Dashboard</a>
  </main>
</body>
</html>
