<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>504 — Wokku</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0D1424; --surface:#1e1e32; --outline:rgba(192,193,255,0.12);
      --text:#fff; --muted:#958e9e; --accent:#c0c1ff; --accent-deep:#5625ab;
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0}
    body{
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(86,37,171,0.35), transparent 60%),
        radial-gradient(900px 500px at 90% 110%, rgba(192,193,255,0.18), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;
    }
    .card{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--outline);
      border-radius:16px;padding:40px 36px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.45)}
    .brand{font-weight:700;font-size:14px;letter-spacing:0.12em;text-transform:uppercase;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent-deep) 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:28px}
    .code{font-weight:700;font-size:72px;line-height:1;letter-spacing:-0.03em;margin-bottom:8px;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent-deep) 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent}
    h1{font-size:22px;font-weight:700;margin:0 0 12px;letter-spacing:-0.01em}
    p{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 20px}
    .status{display:inline-flex;align-items:center;gap:8px;color:var(--accent);font-size:12px;
      letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
    .status .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;
      animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}
    footer{margin-top:32px;color:var(--muted);font-size:11px;letter-spacing:0.08em;text-transform:uppercase}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--accent)}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">Wokku</div>
    <div class="code">504</div>
    <h1>Gateway timeout</h1>
    <p>The upstream took too long to respond. A single slow request or an overloaded process is the usual cause.</p>
    <div class="status"><span class="dot"></span>Retrying automatically</div>
    <footer>Powered by <a href="https://wokku.cloud">wokku.cloud</a></footer>
  </main>
  <script>
    var r=2,L=4096;(function t(){var x=new XMLHttpRequest();x.open('HEAD',location.href,true);
      x.onload=function(){if(x.status>=200&&x.status<400){location.reload(true)}
        else{if(r<L)r*=2;setTimeout(t,r*1000)}};
      x.onerror=function(){if(r<L)r*=2;setTimeout(t,r*1000)};x.send();})();
  </script>
</body>
</html>
