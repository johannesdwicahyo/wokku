# name: HedgeDoc
# documentation: https://github.com/hedgedoc/hedgedoc
# slogan: Open-source collaborative markdown editor for real-time note-taking
# category: productivity
# tags: markdown, collaboration, notes, wiki
# icon: productivity
# port: 3000

services:
  hedgedoc:
    image: quay.io/hedgedoc/hedgedoc:latest
    environment:
      - CMD_DB_URL=postgres://hedgedoc:hedgedoc@postgres:5432/hedgedoc
      - CMD_DOMAIN=localhost
      - CMD_PORT=3000
      - CMD_URL_ADDPORT=true
      - CMD_PROTOCOL_USESSL=false
      - CMD_SESSION_SECRET=changeme-session-secret
      - CMD_ALLOW_ANONYMOUS=true
      - CMD_ALLOW_EMAIL_REGISTER=true
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - hedgedoc-uploads:/hedgedoc/public/uploads

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=hedgedoc
      - POSTGRES_USER=hedgedoc
      - POSTGRES_PASSWORD=hedgedoc
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  hedgedoc-uploads:
  postgres-data:
