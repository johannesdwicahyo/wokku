# name: Medusa
# documentation: https://github.com/medusajs/medusa
# slogan: Headless commerce engine for digital products
# category: ecommerce
# tags: ecommerce, headless, node
# icon: ecommerce

services:
  medusa:
    image: medusa:latest
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7

volumes:
  postgres-data:
