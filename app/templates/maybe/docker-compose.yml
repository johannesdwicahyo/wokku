# name: Maybe
# documentation: https://github.com/maybe-finance/maybe
# slogan: Self-hosted personal finance and wealth management application
# category: finance
# tags: finance, budgeting, investments, wealth
# icon: finance
# deploy_method: docker_image
# port: 3000

services:
  maybe:
    image: ghcr.io/maybe-finance/maybe:latest
    environment:
      - RAILS_ENV=production
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
