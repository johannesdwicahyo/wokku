# name: Mattermost
# documentation: https://github.com/mattermost/mattermost
# slogan: Open-source, self-hosted team messaging and collaboration platform
# category: communication
# tags: chat, team, messaging, collaboration
# icon: communication
# port: 8065

services:
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://mattermost:mattermost@postgres:5432/mattermost?sslmode=disable
      - MM_SERVICESETTINGS_SITEURL=http://localhost:8065
    ports:
      - "8065:8065"
    depends_on:
      - postgres
    volumes:
      - mattermost-data:/mattermost/data

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=mattermost
      - POSTGRES_USER=mattermost
      - POSTGRES_PASSWORD=mattermost
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mattermost-data:
  postgres-data:
