# name: Scrutiny
# documentation: https://github.com/AnalogJ/scrutiny
# slogan: Hard drive health dashboard with S.M.A.R.T. monitoring and alerting
# category: monitoring
# tags: disk, health, smart, monitoring, storage
# icon: monitoring
# port: 8080

services:
  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    ports:
      - "8080:8080"
    volumes:
      - scrutiny-config:/opt/scrutiny/config
      - scrutiny-influxdb:/opt/scrutiny/influxdb

volumes:
  scrutiny-config:
  scrutiny-influxdb:
