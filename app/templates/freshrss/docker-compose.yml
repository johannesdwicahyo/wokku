# name: FreshRSS
# documentation: https://github.com/FreshRSS/FreshRSS
# slogan: Self-hosted RSS feed aggregator and reader
# category: productivity
# tags: rss, feed, reader, aggregator
# icon: productivity
# port: 80

services:
  freshrss:
    image: freshrss/freshrss:latest
    environment:
      - TZ=UTC
      - CRON_MIN=1,31
    ports:
      - "80:80"
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions

volumes:
  freshrss-data:
  freshrss-extensions:
