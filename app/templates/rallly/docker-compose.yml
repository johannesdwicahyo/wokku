# name: Rallly
# documentation: https://github.com/lukevella/rallly
# slogan: Self-hosted scheduling and poll tool for finding the best meeting time
# category: productivity
# tags: scheduling, polls, meetings, calendar
# icon: productivity
# deploy_method: docker_image
# port: 3000

services:
  rallly:
    image: lukevella/rallly:latest
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
