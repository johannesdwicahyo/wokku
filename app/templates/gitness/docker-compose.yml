# name: Gitness
# documentation: https://github.com/harness/gitness
# slogan: Open-source code hosting and CI/CD platform from Harness
# category: developer-tools
# tags: git, ci-cd, code-hosting, devops
# icon: developer-tools
# port: 3000

services:
  gitness:
    image: harness/gitness:latest
    environment:
      - GITNESS_HTTP_BIND=:3000
      - GITNESS_URL_BASE=http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - gitness-data:/data
