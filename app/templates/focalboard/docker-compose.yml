# name: Focalboard
# documentation: https://github.com/mattermost/focalboard
# slogan: Project management and kanban boards
# category: productivity
# tags: project-management, kanban, go
# icon: form
# port: 8000

services:
  focalboard:
    image: focalboard:latest
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
