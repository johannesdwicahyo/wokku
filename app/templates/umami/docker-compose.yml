# name: Umami
# documentation: https://github.com/umami-software/umami
# slogan: Simple and fast website analytics
# category: analytics
# tags: analytics, node, lightweight
# icon: analytics
# port: 3000

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest:latest
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
