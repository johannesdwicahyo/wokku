# documentation: https://github.com/directus/directus
# slogan: Instant REST and GraphQL API for any SQL database
# category: cms
# tags: headless-cms, api, node
# icon: cms
# port: 8055

services:
  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
