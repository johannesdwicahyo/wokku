# documentation: https://github.com/go-gitea/gitea
# slogan: Lightweight self-hosted Git service
# category: devtools
# tags: git, code-hosting, go
# icon: git

services:
  gitea:
    image: gitea:latest
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
