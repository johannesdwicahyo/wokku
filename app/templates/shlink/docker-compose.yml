# documentation: https://github.com/shlinkio/shlink
# slogan: Self-hosted URL shortener with analytics
# category: links
# tags: url-shortener, links, php
# icon: link
# port: 8080

services:
  shlink:
    image: shlinkio/shlink:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
