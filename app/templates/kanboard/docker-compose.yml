# name: Kanboard
# documentation: https://github.com/kanboard/kanboard
# slogan: Simple and open-source project management software with kanban boards
# category: productivity
# tags: kanban, project-management, tasks, agile
# icon: productivity
# port: 80

services:
  kanboard:
    image: kanboard/kanboard:latest
    environment:
      - DATABASE_URL=postgres://kanboard:kanboard@postgres:5432/kanboard
    ports:
      - "80:80"
    depends_on:
      - postgres
    volumes:
      - kanboard-data:/var/www/app/data
      - kanboard-plugins:/var/www/app/plugins

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=kanboard
      - POSTGRES_USER=kanboard
      - POSTGRES_PASSWORD=kanboard
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  kanboard-data:
  kanboard-plugins:
  postgres-data:
