# name: Leantime
# documentation: https://github.com/Leantime/leantime
# slogan: Strategic project management system for non-project managers
# category: productivity
# tags: project-management, tasks, strategy, productivity
# icon: productivity
# port: 80

services:
  leantime:
    image: leantime/leantime:latest
    environment:
      - LEAN_DB_HOST=mysql
      - LEAN_DB_USER=leantime
      - LEAN_DB_PASSWORD=leantime
      - LEAN_DB_DATABASE=leantime
      - LEAN_SESSION_PASSWORD=changeme-session-password
      - LEAN_APP_URL=http://localhost
    ports:
      - "80:80"
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    environment:
      - MYSQL_DATABASE=leantime
      - MYSQL_USER=leantime
      - MYSQL_PASSWORD=leantime
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
