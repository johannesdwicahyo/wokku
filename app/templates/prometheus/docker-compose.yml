# name: Prometheus
# documentation: https://github.com/prometheus/prometheus
# slogan: Open-source monitoring and alerting toolkit for time-series metrics
# category: monitoring
# tags: monitoring, metrics, alerting, time-series
# icon: monitoring
# port: 9090

services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus

volumes:
  prometheus-data:
