# name: Hasura
# documentation: https://github.com/hasura/graphql-engine
# slogan: Instant GraphQL APIs on Postgres and other databases
# category: data
# tags: graphql, api, postgres
# icon: data
# port: 8080
# generate_secrets: HASURA_GRAPHQL_ADMIN_SECRET
# alias_env: HASURA_GRAPHQL_DATABASE_URL=DATABASE_URL,HASURA_GRAPHQL_METADATA_DATABASE_URL=DATABASE_URL

services:
  hasura:
    image: hasura/graphql-engine:latest
    environment:
      - HASURA_GRAPHQL_ENABLE_CONSOLE=true
      - HASURA_GRAPHQL_DEV_MODE=false
      - HASURA_GRAPHQL_ENABLED_LOG_TYPES=startup, http-log, webhook-log, websocket-log, query-log
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
