# name: Wiki.js
# documentation: https://github.com/requarks/wiki
# slogan: Powerful and extensible open-source wiki software
# category: productivity
# tags: wiki, documentation, knowledge-base
# icon: productivity
# port: 3000

services:
  wikijs:
    image: ghcr.io/requarks/wiki:2
    environment:
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=wikijs
      - DB_PASS=wikijs
      - DB_NAME=wikijs
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=wikijs
      - POSTGRES_USER=wikijs
      - POSTGRES_PASSWORD=wikijs
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
