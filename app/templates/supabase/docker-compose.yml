# name: Supabase
# documentation: https://github.com/supabase/supabase
# slogan: Open-source Firebase alternative with PostgreSQL
# category: platform
# tags: baas, firebase-alt, postgres
# icon: platform

services:
  supabase:
    image: supabase:latest
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
