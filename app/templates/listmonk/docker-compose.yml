# name: Listmonk
# documentation: https://github.com/knadh/listmonk
# slogan: Self-hosted newsletter and mailing list manager
# category: email
# tags: newsletter, email, go
# icon: mail
# port: 9000

services:
  listmonk:
    image: listmonk/listmonk:latest
    ports:
      - "9000:9000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
