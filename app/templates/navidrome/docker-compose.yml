# name: Navidrome
# documentation: https://github.com/navidrome/navidrome
# slogan: Modern music server and streamer compatible with Subsonic/Airsonic clients
# category: media
# tags: music, streaming, audio, subsonic
# icon: media
# port: 4533

services:
  navidrome:
    image: deluan/navidrome:latest
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
    ports:
      - "4533:4533"
    volumes:
      - navidrome-data:/data

volumes:
  navidrome-data:
