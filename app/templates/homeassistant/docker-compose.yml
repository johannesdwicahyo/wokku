# name: Home Assistant
# documentation: https://github.com/home-assistant/core
# slogan: Open-source home automation platform for local control and privacy
# category: automation
# tags: home-automation, iot, smart-home
# icon: automation
# port: 8123

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    environment:
      - TZ=UTC
    ports:
      - "8123:8123"
    volumes:
      - homeassistant-config:/config

volumes:
  homeassistant-config:
