# name: Traefik
# documentation: https://github.com/traefik/traefik
# slogan: Modern HTTP reverse proxy and load balancer for microservices
# category: developer-tools
# tags: proxy, load-balancer, ingress, networking
# icon: developer-tools
# port: 8080

services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
