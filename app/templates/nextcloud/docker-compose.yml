# name: Nextcloud
# documentation: https://github.com/nextcloud/server
# slogan: Self-hosted productivity platform for file sync, calendar, and collaboration
# category: file-storage
# tags: cloud, files, sync, calendar, contacts
# icon: file-storage
# port: 80

services:
  nextcloud:
    image: nextcloud:latest
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
    ports:
      - "80:80"
    depends_on:
      - postgres
    volumes:
      - nextcloud-data:/var/www/html

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  nextcloud-data:
  postgres-data:
