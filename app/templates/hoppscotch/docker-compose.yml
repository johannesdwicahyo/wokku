# name: Hoppscotch
# documentation: https://github.com/hoppscotch/hoppscotch
# slogan: Open-source API development ecosystem
# category: devtools
# tags: api-testing, http, node
# icon: api

services:
  hoppscotch:
    image: hoppscotch:latest
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
